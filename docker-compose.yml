services:
  db:
    image: postgis/postgis:16-3.4
    container_name: zonca-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zonca}
      POSTGRES_USER: ${POSTGRES_USER:-zonca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zonca}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: zonca-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app  # hot reload in dev
      - uploads:/app/uploads    # certificati medici persistenti

  frontend:
    build: ./frontend
    container_name: zonca-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
