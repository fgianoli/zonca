server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Buffer più ampi per evitare 400 "request header too large"
    client_header_buffer_size 8k;
    large_client_header_buffers 8 32k;
    client_body_buffer_size 16k;
    client_max_body_size 20m;

    # Compressione per assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/javascript application/json image/svg+xml;

    # API → backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Buffer proxy più ampi
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    # Static assets con cache lunga
    location ~* \.(?:ico|gif|jpe?g|png|webp|svg|woff2?|ttf|eot|otf|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
